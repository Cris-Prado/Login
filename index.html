<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href='https://unpkg.com/boxicons@2.1.2/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="style.css">
    <title>Cadastro - Fantasma Codes</title>
</head>
<body>
    <main class="main">
        <div class="img"></div>
        <div class="container">
            <div class="grupo">
                <h1 class="title"><u>LOGIN</u></h1>
                <div class="redes">
                    <i class='bx bxl-google'></i>
                    <i class='bx bxl-twitter' ></i>
                    <i class='bx bxl-github' ></i>
                    <i class='bx bxl-facebook' ></i>
                </div>
                <form action="" class="form">
                    <fieldset>
                        <div class="classes">
                            <div class="classe">
                                <label for="user" class="label">Usuario/Email</label><br>
                                <i class='bx bx-user loge'></i>
                                <input type="email" name="user" id="user" class="input" placeholder="Usuario ou Email" required><br>
                            </div>
                            
                            <div class="classe">
                                <label for="user" class="label">Senha</label><br>
                                <i class='bx bx-lock-alt loge'></i>
                                <input type="password" name="user" id="user" class="input" placeholder="Senha" required>
                            </div>
                        </div>
                    </fieldset>

                    <div class="sessao">
                        <div class="sec"><input type="checkbox" name="sessao-yes" id="check"><span>Salvar Sessão</span></div>
                    </div>


                    <input type="submit" value="ENTRAR" class="botao">
                </form>
                <div class="rodape">
                    <span><a href="">CADASTRE-SE</a></span>
                    <span>/</span>
                    <span><a href="">RECUPERAR SENHA</a></span>
                    <!--<a href="/">CADASTRE-SE</a><span>/</span><span><a href="/">RECUPERAR SUA SENHA</a></span> -->
                </div>
            </div>
        </div>
        <div class="home">
            <a href=""><i class='bx bxs-home'></i></a>
        </div>
    </main>
</body>
</html>
